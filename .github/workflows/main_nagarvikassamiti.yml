name: Deploy Python FastAPI backend to Azure App Service

on:
  push:
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Prepare app at ROOT level (IMPORTANT FIX)
      - name: Prepare deployment package
        run: |
          cp -r backend/* .
          zip -r app.zip .

      # Deploy to Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: nagarvikassamit   # ✅ your actual app name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app.zip
