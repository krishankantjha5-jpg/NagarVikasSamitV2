name: Build and deploy Python app to Azure Web App - nagar-vikas-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Use Python 3.11 for best compatibility on Azure
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Optional: run a quick install check to fail early if requirements are broken
      - name: Validate dependencies install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Upload ONLY backend as the artifact
      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: backend

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_134C0FF8F90743B5A0503FC0849AAB6B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_79613275161443758DD2E321FD3A37CD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8DFEBDB30252403882E570A71BEB2FE8 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'nagar-vikas-api'
          slot-name: 'Production'
          package: backend
