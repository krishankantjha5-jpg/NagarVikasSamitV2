name: Azure Static Web Apps CI/CD

on:
  push:
    paths:
      - "frontend/**"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 🔥 ADD THIS STEP (IMPORTANT)
      - name: Build frontend with env
        run: |
          npm install
          npm run build
        working-directory: .
        env:
          VITE_API_URL: https://nagarvikassamit-ath8gpdyfxbzdpdx.centralindia-01.azurewebsites.net

      # Deploy built files
      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_MOSS_011318700 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: "dist"
